<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <link rel="stylesheet" href="/css/entry.css">
    <style>
        :root { --maxWidth: 67vw; }
        .report-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.45rem 1rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .report-btn:hover { color: #111; border-color: #aaa; }
        body.dark .report-btn { color: #888; border-color: #333; }
        body.dark .report-btn:hover { color: #eee; border-color: #666; }

        .overlay-link {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: #aaa;
            cursor: pointer;
        }
        .overlay-link:hover { text-decoration-color: #555; }

        #report-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        #report-overlay.open { opacity: 1; pointer-events: auto; }
        #report-modal {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        }
        #report-overlay-bar {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        #report-close-btn {
            background: none;
            border: none;
            color: #555;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            line-height: 1;
            padding: 0.2rem 0.4rem;
        }
        #report-close-btn:hover { color: #111; }
        #report-frame {
            flex: 1;
            width: 100%;
            border: none;
        }
    </style>
    <title></title>
</head>
<body>
  <button type="button" class="back-btn" onclick="history.back()">←</button>
  <div class="entry-container" id="r-body"></div>

  <div id="report-overlay">
    <div id="report-modal">
      <div id="report-overlay-bar">
        <button type="button" id="report-close-btn">← back</button>
      </div>
      <iframe id="report-frame" src="about:blank" title="report"></iframe>
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
(async () => {
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) return;

    const { data, error } = await db.from('research').select('*').eq('slug', slug).single();
    if (error || !data) return;

    document.title = data.title;
    const body = document.getElementById('r-body');

    const lines = (data.body || '').split('\n').map(l => l.trimEnd()).join('<br>\n');
    // parse [text](url) into overlay links
    const parsed = lines.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) =>
        `<a class="overlay-link" data-url="${url}">${text}</a>`
    );

    body.innerHTML = `
        <h1>${data.title}</h1>
        <div class="entry-content"><p>${parsed}</p></div>
        ${data.attachment_url ? `<button type="button" class="report-btn" id="report-open-btn">view report →</button>` : ''}
    `;

    const overlay = document.getElementById('report-overlay');
    const frame = document.getElementById('report-frame');

    function openOverlay(url) {
        frame.src = url;
        overlay.classList.add('open');
    }

    function closeOverlay() {
        overlay.classList.remove('open');
        setTimeout(() => { frame.src = 'about:blank'; }, 300);
    }

    // inline [text](url) links
    body.querySelectorAll('.overlay-link').forEach(a => {
        a.addEventListener('click', e => { e.preventDefault(); openOverlay(a.dataset.url); });
    });

    // attachment_url button (fallback / explicit button)
    if (data.attachment_url) {
        document.getElementById('report-open-btn')?.addEventListener('click', () => openOverlay(data.attachment_url));
    }

    document.getElementById('report-close-btn').addEventListener('click', closeOverlay);

    // click backdrop (outside modal) to close
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
    });
})();
</script>
</html>
