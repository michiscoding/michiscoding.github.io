<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <link rel="stylesheet" href="/css/entry.css">
    <style>
        :root { --maxWidth: 67vw; }

        .overlay-link {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: #888;
            cursor: pointer;
        }
        .overlay-link:hover { text-decoration-color: #333; }

        .attachment-section {
            margin-top: 2.5rem;
        }
        .attachment-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        .attachment-iframe {
            width: 100%;
            height: 920px;
            border: none;
            border-radius: 12px;
            display: block;
        }

        #report-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        #report-overlay.open { opacity: 1; pointer-events: auto; }
        #report-modal {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        }
        #report-close-btn {
            position: absolute;
            top: 0.6rem;
            right: 0.75rem;
            background: none;
            border: none;
            color: rgba(0,0,0,0.25);
            font-size: 1.3rem;
            line-height: 1;
            cursor: pointer;
            z-index: 10;
            padding: 0.2rem 0.3rem;
        }
        #report-close-btn:hover { color: rgba(0,0,0,0.6); }
        #report-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
    <title></title>
</head>
<body>
  <button type="button" class="back-btn" onclick="history.back()">←</button>
  <div class="entry-container" id="r-body"></div>

  <div id="report-overlay">
    <div id="report-modal">
      <button type="button" id="report-close-btn">×</button>
      <iframe id="report-frame" src="about:blank" title="report"></iframe>
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
(async () => {
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) return;

    const { data, error } = await db.from('research').select('*').eq('slug', slug).single();
    if (error || !data) return;

    document.title = data.title;
    const body = document.getElementById('r-body');

    const lines = (data.body || '').split('\n').map(l => l.trimEnd()).join('<br>\n');
    const parsed = lines.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) =>
        `<a class="overlay-link" data-url="${url}">${text}</a>`
    );

    const attachmentSection = data.attachment_url ? `
        <div class="attachment-section">
            <span class="attachment-label">dashboard - updated daily</span>
            <iframe class="attachment-iframe" src="${data.attachment_url}" title="dashboard"></iframe>
        </div>` : '';

    body.innerHTML = `
        <h1>${data.title}</h1>
        <div class="entry-content"><p>${parsed}</p></div>
        ${attachmentSection}
    `;

    // overlay for inline [text](url) links
    const overlay = document.getElementById('report-overlay');
    const frame = document.getElementById('report-frame');

    function openOverlay(url) {
        frame.src = url;
        overlay.classList.add('open');
    }

    function closeOverlay() {
        overlay.classList.remove('open');
        setTimeout(() => { frame.src = 'about:blank'; }, 300);
    }

    body.querySelectorAll('.overlay-link').forEach(a => {
        a.addEventListener('click', e => { e.preventDefault(); openOverlay(a.dataset.url); });
    });

    document.getElementById('report-close-btn').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
    });
})();
</script>
</html>
