<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Model — Live Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #0a0a0a; color: #e0e0e0; }
header { padding: 24px 40px 18px; border-bottom: 1px solid #1e1e1e;
         display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
#status { font-size: 0.8rem; color: #555; }
.live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #4466ff; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.main { max-width: 1000px; margin: 0 auto; padding: 28px 40px 60px; }

/* stat row */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 36px; }
.stat { background: #111; border-radius: 8px; padding: 16px 18px; border: 1px solid #1a1a1a; }
.stat .label { font-size: 0.72rem; color: #555; text-transform: uppercase;
               letter-spacing: .06em; margin-bottom: 4px; }
.stat .value { font-size: 1.3rem; font-weight: 700; }

/* section */
h2 { font-size: 0.85rem; font-weight: 700; color: #555; text-transform: uppercase;
     letter-spacing: .07em; margin: 32px 0 12px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
th { text-align: left; padding: 8px 12px; background: #111; color: #555;
     font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em; }
td { padding: 9px 12px; border-bottom: 1px solid #161616; font-size: 0.87rem; }
tr:hover td { background: #111; }
.pos { color: #00cc66; font-weight: 600; }
.neg { color: #ff4444; font-weight: 600; }
.neu { color: #888; }
.buy-tag  { background: #0d2e18; color: #00cc66; font-size: 0.72rem;
            font-weight: 700; padding: 2px 7px; border-radius: 3px; }
.hold-tag { background: #1a1a1a; color: #666; font-size: 0.72rem;
            font-weight: 700; padding: 2px 7px; border-radius: 3px; }
#chart-wrap { background: #111; border-radius: 10px; border: 1px solid #1a1a1a;
              padding: 20px; margin-bottom: 8px; }
canvas { width: 100% !important; height: 200px !important; }
.empty { color: #333; font-size: 0.85rem; padding: 16px 0; }
@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr;}
  .main,header{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>
<header>
  <h1><span class="live-dot"></span>Ranking Model — Live Paper Trading</h1>
  <span id="status">Loading…</span>
</header>
<div class="main">
  <div class="stats" id="stats"></div>

  <h2>Cumulative Realized P&amp;L</h2>
  <div id="chart-wrap"><canvas id="pnl-chart"></canvas></div>

  <h2>Open Positions</h2>
  <div id="holdings"></div>

  <h2>Today's Rankings</h2>
  <div id="rankings"></div>

  <h2>Recent Closed Trades</h2>
  <div id="realized"></div>
</div>

<script>
let chart = null;

function fmt(n) {
  return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
}

function render(d) {
  // stats
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="label">Realized P&L</div>
      <div class="value ${d.total_pnl >= 0 ? 'pos' : 'neg'}">${fmt(d.total_pnl)}</div>
    </div>
    <div class="stat">
      <div class="label">Open Positions</div>
      <div class="value" style="color:#ccc">${d.holdings.length}</div>
    </div>
    <div class="stat">
      <div class="label">Closed Trades</div>
      <div class="value" style="color:#ccc">${d.n_realized}</div>
    </div>
    <div class="stat">
      <div class="label">Last Run</div>
      <div class="value" style="color:#888;font-size:0.9rem">${d.last_run || '—'}</div>
    </div>`;

  // chart
  const labels = d.cum_pnl.map(p => p.t);
  const values = d.cum_pnl.map(p => p.v);
  const color  = d.total_pnl >= 0 ? '#00cc66' : '#ff4444';
  const ctx    = document.getElementById('pnl-chart');
  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = values;
    chart.data.datasets[0].borderColor = color;
    chart.data.datasets[0].backgroundColor = color + '18';
    chart.update();
  } else {
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{
        data: values, borderColor: color, borderWidth: 2,
        pointRadius: 3, fill: true, backgroundColor: color + '18', tension: 0.3,
      }]},
      options: {
        animation: false,
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: c => ' $' + c.parsed.y.toFixed(2) }}},
        scales: {
          x: { ticks: { color: '#444', font: { size: 9 }, maxRotation: 30 }},
          y: { grid: { color: '#1a1a1a' },
               ticks: { color: '#555', callback: v => '$' + v.toFixed(0) }}
        },
        responsive: true, maintainAspectRatio: false,
      }
    });
  }

  // holdings
  const hEl = document.getElementById('holdings');
  if (!d.holdings.length) {
    hEl.innerHTML = '<p class="empty">No open positions</p>';
  } else {
    hEl.innerHTML = `<table><thead><tr>
      <th>Ticker</th><th>Shares</th><th>Entry Price</th><th>Opened</th><th>Score</th>
    </tr></thead><tbody>` +
    d.holdings.map(h => `<tr>
      <td><strong>${h.ticker}</strong></td>
      <td>${h.qty}</td>
      <td>$${h.entry.toFixed(2)}</td>
      <td style="color:#555;font-size:0.82rem">${h.time}</td>
      <td class="${h.score >= 0 ? 'pos' : 'neg'}">${h.score.toFixed(4)}</td>
    </tr>`).join('') + '</tbody></table>';
  }

  // rankings
  const rEl = document.getElementById('rankings');
  if (!d.rankings.length) {
    rEl.innerHTML = '<p class="empty">No rankings yet — runs at 4:15 PM ET</p>';
  } else {
    rEl.innerHTML = `<table><thead><tr>
      <th>Rank</th><th>Ticker</th><th>Score</th><th>Action</th>
    </tr></thead><tbody>` +
    d.rankings.map(r => `<tr>
      <td class="neu">#${r.rank}</td>
      <td><strong>${r.ticker}</strong></td>
      <td class="${r.score >= 0 ? 'pos' : 'neg'}">${r.score.toFixed(4)}</td>
      <td>${r.buy
        ? '<span class="buy-tag">BUY</span>'
        : '<span class="hold-tag">WATCH</span>'}</td>
    </tr>`).join('') + '</tbody></table>';
  }

  // realized trades
  const tEl = document.getElementById('realized');
  if (!d.realized.length) {
    tEl.innerHTML = '<p class="empty">No closed trades yet</p>';
  } else {
    tEl.innerHTML = `<table><thead><tr>
      <th>Ticker</th><th>Bought</th><th>Sold</th>
      <th>Entry</th><th>Exit</th><th>Qty</th><th>P&L</th>
    </tr></thead><tbody>` +
    [...d.realized].reverse().map(t => `<tr>
      <td><strong>${t.ticker}</strong></td>
      <td style="color:#555;font-size:0.8rem">${t.buy_time}</td>
      <td style="color:#555;font-size:0.8rem">${t.sell_time}</td>
      <td>$${t.entry}</td>
      <td>$${t.exit}</td>
      <td>${t.qty}</td>
      <td class="${t.pnl >= 0 ? 'pos' : 'neg'}">${fmt(t.pnl)}</td>
    </tr>`).join('') + '</tbody></table>';
  }
}
