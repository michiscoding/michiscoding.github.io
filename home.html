<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/home.css">
    <title>home</title>
</head>

<body class="home-page">
    <!-- music player -->
    <div class="button-container">
            <img class="custom-pause-button" onclick="pauseMusic()" id="pause" src="/images/pause.png"></img></button>
            <img class="custom-pause-button" onclick="playMusic()" id="play" src="/images/play.png"></img></button>
        <div class="music-label-container">
            <span class="song-name">CODEINE CUPS</span>
            <span class="artist">SLIM HUSTLA (feat. DJ ÆDIDIAS)</span>
        </div>
    </div>
    <audio id="audio">
        <source src="/images/track 1.mp3" type="audio/mpeg">
    </audio>


    <div class="filter-pills" id="filter-pills">
        <button type="button" class="filter-pill active" data-filter="home">home</button>
        <button type="button" class="filter-pill" data-filter="all">all</button>
        <button type="button" class="filter-pill" data-filter="365">365</button>
        <button type="button" class="filter-pill" data-filter="nature">nature</button>
        <button type="button" class="filter-pill" data-filter="jiu-jitsu">jiu jitsu</button>
        <button type="button" class="filter-pill" data-filter="ig">ig</button>
        <button type="button" class="filter-pill" data-filter="vsco">vsco</button>
        <button type="button" class="filter-pill" data-filter="random">random</button>
    </div>

    <div id="password-modal" class="pw-modal">
        <div class="pw-box">
            <p class="pw-prompt">michael and _______?</p>
            <input type="text" id="pw-input" class="pw-input" autocomplete="off" placeholder="..." aria-label="password">
            <p id="pw-error" class="pw-error"></p>
        </div>
    </div>

    <div id="gallery-365"></div>

    <div class="grid">
        <div class="grid-sizer"></div>
    </div>
</body>


<!-- Link your external JavaScript file -->
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
