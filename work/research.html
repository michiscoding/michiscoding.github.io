<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <title>research</title>
</head>

<body>
<div class="blog-container">
  <h1>research</h1>
  <div id="entries-list"></div>
</div>
</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];

async function loadEntries() {
    const { data } = await db.from('research').select('slug, title, body, created_at').order('created_at', { ascending: false });
    const container = document.getElementById('entries-list');

    for (const row of (data || [])) {
        const text = (row.body || '').replace(/\s+/g, ' ').trim();
        const wordCount = text.split(' ').filter(w => w.length > 0).length;
        const d = new Date(row.created_at);
        const dateLabel = `${months[d.getMonth()]} ${d.getDate()} ${d.getFullYear()}`;

        const record = document.createElement('div');
        record.className = 'blog-record';
        record.innerHTML = `
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <div class="blog-details-1"><a href="/r-entry/view.html?slug=${row.slug}" class="blog-link">${row.title}</a></div>
                <div class="blog-details-2">${dateLabel} — word count ${wordCount}</div>
            </div>
        `;
        container.appendChild(record);
    }
}

loadEntries();
</script>
</html>
