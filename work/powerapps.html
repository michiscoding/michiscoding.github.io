<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <title>powerapps</title>
</head>

<body>
    <div class="pa-filter-bar">
        <button type="button" class="filter-pill active">all</button>
        <button type="button" class="filter-pill">flows</button>
        <button type="button" class="filter-pill">pages</button>
        <button type="button" class="filter-pill">apps</button>
    </div>

    <div class="grid">
        <div class="grid-sizer"></div>
    </div>
</body>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="/js/home.js"></script>
<script>
    const grid = document.querySelector('.grid');
    let allEntries = [];
    let activeFilter = 'all';

    function renderGrid() {
        const items = grid.querySelectorAll('.grid-item');
        items.forEach(el => el.remove());

        const filtered = activeFilter === 'all' ? allEntries : allEntries.filter(e => e.tag === activeFilter);
        filtered.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            const mediaSrc = entry.media || '';
            const mediaEl = mediaSrc.endsWith('.mp4')
                ? `<video class="img" muted autoplay loop playsinline><source src="${mediaSrc}" type="video/mp4"></video>`
                : `<img class="img" alt="${entry.title}" src="${mediaSrc}">`;
            item.innerHTML = `
                <div class="gallery-item" onclick="location.href='/powerapps/${entry.slug}.html'">
                    ${mediaEl}
                    <div class="gallery-overlay"><span class="gallery-title">${entry.title}</span></div>
                </div>`;
            grid.appendChild(item);
        });

        imagesLoaded(grid, () => {
            new Masonry(grid, { itemSelector: '.grid-item', columnWidth: '.grid-sizer', percentPosition: true });
        });
    }

    document.querySelectorAll('.filter-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            activeFilter = pill.textContent.trim();
            renderGrid();
        });
    });

    fetch('/powerapps.json')
        .then(r => r.json())
        .then(data => { allEntries = data; renderGrid(); })
        .catch(() => {});

</script>

</html>
