<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <title>powerapps</title>
</head>

<body>
    <div class="filter-bar">
        <button type="button" class="filter-pill active">all</button>
        <button type="button" class="filter-pill">flows</button>
        <button type="button" class="filter-pill">pages</button>
        <button type="button" class="filter-pill">apps</button>
    </div>

    <div class="grid">
        <div class="grid-sizer"></div>

        <div class="grid-item">
            <div class="gallery-item" onclick="location.href='/powerapps/test-1.html'">
                <img class="img" alt="approval flow" src="https://64.media.tumblr.com/a17df8ad41a394b8a1749f54315fbdb4/9300f1904ee9ac2c-75/s500x750/8931b0e27784d1a42512a5e341e0b0f8b40e0092.gif">
                <div class="gallery-overlay">
                    <span class="gallery-title">approval flow</span>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="gallery-item" onclick="location.href='/powerapps/test-2.html'">
                <img class="img" alt="intake form" src="https://64.media.tumblr.com/c57a286ae7f70b7811b1341ec0fb5a5c/tumblr_prducatkJe1tdnee7o1_500.gif">
                <div class="gallery-overlay">
                    <span class="gallery-title">intake form</span>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="gallery-item" onclick="location.href='/powerapps/test-3.html'">
                <img class="img" alt="dashboard app" src="https://64.media.tumblr.com/368b30aabb2494affc0b7b6dd6251195/tumblr_om05688Oa01rn5gv3o1_500.gifv">
                <div class="gallery-overlay">
                    <span class="gallery-title">dashboard app</span>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="gallery-item" onclick="location.href='/powerapps/test-4.html'">
                <img class="img" alt="email automation" src="https://64.media.tumblr.com/d4b55ff0fe8affb3cb2e608cc4a1332b/tumblr_nhbjgtGy781r918xko1_500.jpg">
                <div class="gallery-overlay">
                    <span class="gallery-title">email automation</span>
                </div>
            </div>
        </div>

    </div>
</body>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="/js/home.js"></script>
<script>
    // filter pills — UI only for now
    document.querySelectorAll('.filter-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
        });
    });
</script>

</html>
