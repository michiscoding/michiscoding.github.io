<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/blog.css">
    <title>thoughts</title>
    <style>
        .month-group { margin-bottom: 0.15rem; }
        .month-header {
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer; padding: 0.5rem 0;
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: #bbb; -webkit-user-select: none; user-select: none;
        }
        .month-header:hover { color: #777; }
        .month-arrow {
            font-size: 0.65rem; display: inline-block;
            transition: transform 0.2s ease; color: #ccc;
        }
        .month-header.open .month-arrow { transform: rotate(90deg); }
        .month-count { margin-left: auto; font-weight: 400; letter-spacing: 0; color: #ccc; }
        .month-entries { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.25s ease; }
        .month-entries.open { grid-template-rows: 1fr; }
        .month-entries-inner { overflow: hidden; }
        .blog-record.indented { padding-left: 1rem; }
        body.dark .month-header { color: #555; }
        body.dark .month-header:hover { color: #999; }
        body.dark .month-arrow, body.dark .month-count { color: #444; }
    </style>
</head>

<body>
<div class="blog-container">
  <h1>my stream of consciousness</h1>
  <div id="entries-list"></div>
</div>

<div id="password-modal" class="pw-modal">
  <div class="pw-box">
    <p class="pw-prompt">michael and _______?</p>
    <input type="text" id="pw-input" class="pw-input" autocomplete="off" placeholder="..." aria-label="password">
    <p id="pw-error" class="pw-error"></p>
  </div>
</div>
</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];

async function loadEntries() {
    const { data } = await db.from('entries').select('date, content').order('date', { ascending: false });
    const container = document.getElementById('entries-list');

    const groups = new Map();
    for (const row of (data || [])) {
        const [yyyy, mm] = row.date.split('-');
        const key = `${yyyy}-${mm}`;
        if (!groups.has(key)) groups.set(key, { year: yyyy, month: mm, entries: [] });
        groups.get(key).entries.push(row);
    }

    for (const group of groups.values()) {
        const monthName = months[parseInt(group.month) - 1];

        const groupEl = document.createElement('div');
        groupEl.className = 'month-group';

        const header = document.createElement('div');
        header.className = 'month-header';
        header.innerHTML = `<span class="month-arrow">›</span><span>${monthName} ${group.year}</span><span class="month-count">${group.entries.length}</span>`;

        const entriesEl = document.createElement('div');
        entriesEl.className = 'month-entries';
        const inner = document.createElement('div');
        inner.className = 'month-entries-inner';

        for (const row of group.entries) {
            const [yyyy, mm, dd] = row.date.split('-');
            const dateLabel = `${mm}${dd}${yyyy.slice(2)}`;
            const text = (row.content || '').replace(/\s+/g, ' ').trim();
            const wordCount = text.split(' ').filter(w => w.length > 0).length;
            const record = document.createElement('div');
            record.className = 'blog-record indented';
            record.innerHTML = `
                <div class="blog-details-1">
                    <a href="/entries/view.html?date=${row.date}" class="blog-link">${dateLabel}</a>
                    <div class="blog-details-2">word count ${wordCount}</div>
                </div>
            `;
            inner.appendChild(record);
        }

        entriesEl.appendChild(inner);

        header.addEventListener('click', () => {
            header.classList.toggle('open');
            entriesEl.classList.toggle('open');
        });

        groupEl.appendChild(header);
        groupEl.appendChild(entriesEl);
        container.appendChild(groupEl);
        first = false;
    }
}

loadEntries();

const OWNER_PW = 'pumkin';
const VIEWER_PW = 'raymond';
const OWNER_KEY = 'michi_owner';
const VIEWER_KEY = 'michi_viewer';

const modal = document.getElementById('password-modal');
const input = document.getElementById('pw-input');
const error = document.getElementById('pw-error');
let pendingHref = null;

function isOwner() {
    return localStorage.getItem(OWNER_KEY) === 'yes';
}

function isViewer() {
    return sessionStorage.getItem(VIEWER_KEY) === 'yes';
}

function openModal(href) {
    pendingHref = href;
    input.value = '';
    error.textContent = '';
    modal.classList.add('open');
    setTimeout(() => input.focus(), 50);
}

function closeModal() {
    modal.classList.remove('open');
    pendingHref = null;
}

document.getElementById('entries-list').addEventListener('click', e => {
    const link = e.target.closest('.blog-link');
    if (!link) return;
    if (isOwner() || isViewer()) return;
    e.preventDefault();
    openModal(link.href);
});

input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = input.value.trim().toLowerCase();
    if (val === OWNER_PW) {
        localStorage.setItem(OWNER_KEY, 'yes');
        window.location.href = pendingHref;
    } else if (val === VIEWER_PW) {
        sessionStorage.setItem(VIEWER_KEY, 'yes');
        window.location.href = pendingHref;
    } else {
        error.textContent = 'try again';
        input.value = '';
    }
});

modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
});

window.addEventListener('pageshow', () => closeModal());
</script>
</html>
