<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/blog.css">
    <title>thoughts</title>
</head>

<body>
<div class="blog-container">
  <h1>my stream of consciousness</h1>
  <div id="entries-list"></div>
</div>

<div id="password-modal" class="pw-modal">
  <div class="pw-box">
    <p class="pw-prompt">michael and _______?</p>
    <input type="text" id="pw-input" class="pw-input" autocomplete="off" placeholder="..." aria-label="password">
    <p id="pw-error" class="pw-error"></p>
  </div>
</div>
</body>

<script src="/js/home.js"></script>
<script>
async function loadEntries() {
    const res = await fetch('https://api.github.com/repos/michiscoding/michiscoding.github.io/contents/entries');
    const files = await res.json();

    // sort newest first
    const sorted = files
        .filter(f => f.name.endsWith('.html'))
        .sort((a, b) => b.name.localeCompare(a.name));

    const container = document.getElementById('entries-list');

    for (const file of sorted) {
        const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
        const dateLabel = `${mm}${dd}${yyyy.slice(2)}`;
        const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
        const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;

        // fetch file content to count words
        const contentRes = await fetch(file.download_url);
        const html = await contentRes.text();

        const doc = new DOMParser().parseFromString(html, 'text/html');
        const text = (doc.querySelector('.entry-content')?.textContent || '').replace(/\s+/g, ' ').trim();
        const wordCount = text.split(' ').filter(w => w.length > 0).length;

        const record = document.createElement('div');
        record.className = 'blog-record';
        record.innerHTML = `
            <div class="blog-details-1">
                <a href="/entries/${file.name}" class="blog-link">${dateLabel}</a>
                <div class="blog-details-2">word count ${wordCount}</div>
            </div>
        `;
        container.appendChild(record);
    }
}

loadEntries();

const OWNER_PW = 'pumkin';
const VIEWER_PW = 'raymond';
const OWNER_KEY = 'michi_owner';
const VIEWER_KEY = 'michi_viewer';

const modal = document.getElementById('password-modal');
const input = document.getElementById('pw-input');
const error = document.getElementById('pw-error');
let pendingHref = null;

function isOwner() {
    return localStorage.getItem(OWNER_KEY) === 'yes';
}

function isViewer() {
    return sessionStorage.getItem(VIEWER_KEY) === 'yes';
}

function openModal(href) {
    pendingHref = href;
    input.value = '';
    error.textContent = '';
    modal.classList.add('open');
    setTimeout(() => input.focus(), 50);
}

function closeModal() {
    modal.classList.remove('open');
    pendingHref = null;
}

document.getElementById('entries-list').addEventListener('click', e => {
    const link = e.target.closest('.blog-link');
    if (!link) return;
    if (isOwner() || isViewer()) return;
    e.preventDefault();
    openModal(link.href);
});

input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = input.value.trim().toLowerCase();
    if (val === OWNER_PW) {
        localStorage.setItem(OWNER_KEY, 'yes');
        window.location.href = pendingHref;
    } else if (val === VIEWER_PW) {
        sessionStorage.setItem(VIEWER_KEY, 'yes');
        window.location.href = pendingHref;
    } else {
        error.textContent = 'try again';
        input.value = '';
    }
});

modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
});

window.addEventListener('pageshow', () => closeModal());
</script>
</html>
