<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <link rel="stylesheet" href="/css/entry.css">
    <style>
        :root { --maxWidth: 67vw; }
        .entry-music { margin-top: 1.5rem; }
        .music-player {
            background: #ededed;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }
        body.dark .music-player { background: #1e1e1e; }
        .music-art {
            width: 44px; height: 44px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .music-meta { flex: 1; min-width: 0; }
        .music-title {
            font-size: 0.82rem; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #111;
        }
        body.dark .music-title { color: #ddd; }
        .music-artist { font-size: 0.72rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-right { display: flex; flex-direction: column; gap: 0.35rem; flex: 2; min-width: 0; }
        .music-row { display: flex; align-items: center; gap: 0.6rem; }
        .music-play {
            background: none; border: none; cursor: pointer; padding: 0;
            color: #111; font-size: 1rem; line-height: 1; flex-shrink: 0;
        }
        body.dark .music-play { color: #ddd; }
        .music-play:hover { opacity: 0.6; }
        .music-progress {
            flex: 1; height: 3px;
            -webkit-appearance: none; appearance: none;
            background: #ccc; border-radius: 2px; outline: none; cursor: pointer;
        }
        body.dark .music-progress { background: #444; }
        .music-progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 10px; border-radius: 50%; background: #111;
        }
        body.dark .music-progress::-webkit-slider-thumb { background: #ddd; }
        .music-time { font-size: 0.68rem; color: #aaa; flex-shrink: 0; min-width: 2rem; text-align: right; }
        .music-no-preview { font-size: 0.78rem; color: #aaa; }
    </style>
    <title></title>
</head>
<body>
  <button type="button" class="back-btn" onclick="history.back()">←</button>
  <div class="entry-container" id="entry-body"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
async function buildSpotifyPlayer(trackId) {
    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/spotify-track?id=${trackId}`, {
            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const track = await res.json();

        const art = track.art || '';
        const title = track.title || '';
        const artist = track.artist || '';
        const preview = track.preview_url || '';

        const wrap = document.createElement('div');
        wrap.className = 'entry-music';

        if (!preview) {
            wrap.innerHTML = `<div class="music-player">
                ${art ? `<img class="music-art" src="${art}" alt="">` : ''}
                <div class="music-meta">
                    <div class="music-title">${title}</div>
                    <div class="music-artist">${artist}</div>
                </div>
                <span class="music-no-preview">no preview</span>
            </div>`;
            return wrap;
        }

        wrap.innerHTML = `<div class="music-player">
            ${art ? `<img class="music-art" src="${art}" alt="">` : ''}
            <div class="music-meta">
                <div class="music-title">${title}</div>
                <div class="music-artist">${artist}</div>
            </div>
            <div class="music-right">
                <div class="music-row">
                    <button class="music-play" aria-label="play">▶</button>
                    <input type="range" class="music-progress" value="0" min="0" max="100" step="0.1">
                    <span class="music-time">0:30</span>
                </div>
            </div>
        </div>`;

        const audio = new Audio(preview);
        const playBtn = wrap.querySelector('.music-play');
        const progress = wrap.querySelector('.music-progress');
        const timeEl = wrap.querySelector('.music-time');

        function fmt(s) { return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; }
            else { audio.pause(); playBtn.textContent = '▶'; }
        });
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progress.value = (audio.currentTime / audio.duration) * 100;
            timeEl.textContent = fmt(audio.duration - audio.currentTime);
        });
        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            progress.value = 0;
            timeEl.textContent = fmt(audio.duration || 30);
        });
        progress.addEventListener('input', () => {
            if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
        });

        return wrap;
    } catch(e) {
        console.error('spotify player error', e);
        return null;
    }
}

(async () => {
    const date = new URLSearchParams(location.search).get('date');
    if (!date) return;

    const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    const [yyyy, mm, dd] = date.split('-');
    const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
    document.title = dateTitle;

    const MEDIA_BASE = SUPABASE_URL + '/storage/v1/object/public/media/';
    const [{ data: entry }, { data: photos }] = await Promise.all([
        db.from('entries').select('content, music_url').eq('date', date).single(),
        db.from('entry_photos').select('storage_path').eq('entry_date', date)
    ]);

    const body = document.getElementById('entry-body');
    body.innerHTML = `<h1>${dateTitle}</h1>`;

    const content = document.createElement('div');
    content.className = 'entry-content';
    const lines = (entry?.content || '').split('\n').map(l => l.trimEnd()).join('<br>\n');
    content.innerHTML = `<p>${lines}</p>`;
    body.appendChild(content);

    if (entry?.music_url) {
        const spotifyMatch = entry.music_url.match(/spotify\.com\/track\/([A-Za-z0-9]+)/);
        if (spotifyMatch) {
            const player = await buildSpotifyPlayer(spotifyMatch[1]);
            if (player) body.appendChild(player);
        }
    }

    if (photos?.length) {
        const gallery = document.createElement('div');
        gallery.className = 'entry-gallery';
        const thumbs = photos.map(p => {
            const src = MEDIA_BASE + p.storage_path;
            const isVideo = /\.(mp4|webm|mov)$/i.test(p.storage_path);
            return `<div class="entry-gallery-item">${isVideo
                ? `<video muted autoplay loop playsinline><source src="${src}" type="video/mp4"></video>`
                : `<img src="${src}" loading="lazy">`}</div>`;
        }).join('');
        gallery.innerHTML = `
            <button class="gallery-arrow gallery-prev" aria-label="previous">&#8592;</button>
            <div class="gallery-track">${thumbs}</div>
            <button class="gallery-arrow gallery-next" aria-label="next">&#8594;</button>
        `;
        body.appendChild(gallery);

        const track = gallery.querySelector('.gallery-track');
        const prevBtn = gallery.querySelector('.gallery-prev');
        const nextBtn = gallery.querySelector('.gallery-next');
        const perPage = 3;
        const totalPages = Math.ceil(photos.length / perPage);
        let page = 0;

        function setPage(p) {
            page = Math.max(0, Math.min(p, totalPages - 1));
            track.scrollLeft = page * track.clientWidth;
            prevBtn.classList.toggle('hidden', page === 0);
            nextBtn.classList.toggle('hidden', page >= totalPages - 1);
        }

        prevBtn.addEventListener('click', () => setPage(page - 1));
        nextBtn.addEventListener('click', () => setPage(page + 1));
        setPage(0);

        const lb = document.createElement('div');
        lb.id = 'media-lb';
        document.body.appendChild(lb);
        lb.addEventListener('click', () => {
            lb.classList.remove('open');
            setTimeout(() => { lb.innerHTML = ''; }, 300);
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.click(); });

        const mediaItems = Array.from(gallery.querySelectorAll('.entry-gallery-item'));
        let lbIndex = 0;

        function lbHtml(item) {
            const video = item.querySelector('video');
            if (video) {
                const src = video.querySelector('source')?.src || video.src;
                return `<video class="lb-media" autoplay loop playsinline controls><source src="${src}" type="video/mp4"></video>`;
            }
            return `<img class="lb-media" src="${item.querySelector('img').src}">`;
        }

        function openLbAt(i) {
            lbIndex = i;
            lb.innerHTML = lbHtml(mediaItems[i]);
            requestAnimationFrame(() => lb.classList.add('open'));
        }

        mediaItems.forEach((item, i) => {
            const el = item.querySelector('img, video');
            if (!el) return;
            el.style.cursor = 'pointer';
            el.addEventListener('click', () => openLbAt(i));
        });

        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
            if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + mediaItems.length) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
        });
    }
})();
</script>
</html>
