<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <link rel="stylesheet" href="/css/entry.css">
    <style>
        :root { --maxWidth: 67vw; }
        .entry-music { margin-top: 1.5rem; }
        .training-link { background: none; border: none; font-family: inherit; font-size: 0.75rem; color: #bbb; cursor: pointer; padding: 0; margin-top: 0.5rem; letter-spacing: 0.02em; display: inline-block; }
        .training-link:hover { color: #666; }
        body.dark .training-link { color: #444; }
        body.dark .training-link:hover { color: #888; }

        #training-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 500;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #training-overlay.open { opacity: 1; pointer-events: auto; }
        #training-modal {
            background: #fff;
            border-radius: 12px;
            padding: 1.75rem 2rem;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 16px 48px rgba(0,0,0,0.18);
        }
        body.dark #training-modal { background: #1a1a1a; }
        #training-modal h2 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #ccc; margin: 0 0 1rem; }
        body.dark #training-modal h2 { color: #444; }
        #training-modal-close { position: absolute; top: 0.75rem; right: 1rem; background: none; border: none; font-size: 1.2rem; color: #ccc; cursor: pointer; line-height: 1; padding: 0.2rem 0.3rem; }
        #training-modal-close:hover { color: #555; }
        #training-modal-body { font-size: 0.95rem; line-height: 1.7; color: #333; white-space: pre-wrap; }
        body.dark #training-modal-body { color: #bbb; }
        .training-tag-section { margin-top: 1rem; }
        .training-tag-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #ccc; margin-bottom: 0.3rem; }
        body.dark .training-tag-label { color: #444; }
        .training-tag { display: inline-block; font-size: 0.72rem; font-weight: 600; color: #777; background: #f0f0f0; border-radius: 4px; padding: 0.18rem 0.5rem; margin: 0.15rem 0.15rem 0 0; }
        body.dark .training-tag { background: #252525; color: #666; }
        #training-full-link { display: block; margin-top: 1.5rem; font-size: 0.75rem; color: #aaa; text-decoration: none; letter-spacing: 0.02em; }
        #training-full-link:hover { color: #555; }
        body.dark #training-full-link:hover { color: #aaa; }
    </style>
    <title></title>
</head>
<body>
  <button type="button" class="back-btn" onclick="location.href='/thoughts.html'">←</button>
  <div class="entry-container" id="entry-body"></div>

  <div id="training-overlay">
    <div id="training-modal">
      <button type="button" id="training-modal-close">×</button>
      <h2>training</h2>
      <div id="training-modal-body"></div>
      <a id="training-full-link" href="#">view full record →</a>
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>

(async () => {
    const date = new URLSearchParams(location.search).get('date');
    if (!date) return;

    const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    const [yyyy, mm, dd] = date.split('-');
    const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
    document.title = dateTitle;

    const [{ data: entry }, { data: photos }, { data: prevRows }, { data: nextRows }, { data: jjEntry }] = await Promise.all([
        db.from('entries').select('content, music_url, thought').eq('date', date).single(),
        db.from('entry_photos').select('storage_path').eq('entry_date', date),
        db.from('entries').select('date').lt('date', date).order('date', { ascending: false }).limit(1),
        db.from('entries').select('date').gt('date', date).order('date', { ascending: true }).limit(1),
        db.from('jiu_jitsu').select('date').eq('date', date).maybeSingle()
    ]);

    const body = document.getElementById('entry-body');
    body.innerHTML = `<h1>${dateTitle}</h1>`;

    if (entry?.music_url) {
        const spotifyMatch = entry.music_url.match(/spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
        if (spotifyMatch) {
            const musicEl = document.createElement('div');
            musicEl.className = 'entry-music';
            musicEl.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/${spotifyMatch[1]}/${spotifyMatch[2]}?utm_source=generator" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
            body.appendChild(musicEl);
        }
    }

    if (jjEntry) {
        const tlink = document.createElement('button');
        tlink.type = 'button';
        tlink.className = 'training-link';
        tlink.textContent = '→ my training';

        const overlay = document.getElementById('training-overlay');
        const modalBody = document.getElementById('training-modal-body');
        const fullLink = document.getElementById('training-full-link');
        fullLink.href = `/jiu-jitsu/view.html?date=${date}`;
        let jjData = null;

        function openTrainingOverlay() {
            overlay.classList.add('open');
        }
        function closeTrainingOverlay() {
            overlay.classList.remove('open');
        }

        tlink.addEventListener('click', async () => {
            if (!jjData) {
                const { data } = await db.from('jiu_jitsu').select('content, techniques, partners').eq('date', date).single();
                jjData = data;
                modalBody.textContent = jjData?.content || '';
                if (jjData?.techniques?.length) {
                    const sec = document.createElement('div');
                    sec.className = 'training-tag-section';
                    sec.innerHTML = `<div class="training-tag-label">techniques</div>` +
                        jjData.techniques.map(t => `<span class="training-tag">${t}</span>`).join('');
                    modalBody.appendChild(sec);
                }
                if (jjData?.partners?.length) {
                    const sec = document.createElement('div');
                    sec.className = 'training-tag-section';
                    sec.innerHTML = `<div class="training-tag-label">partners</div>` +
                        jjData.partners.map(p => `<span class="training-tag">${p}</span>`).join('');
                    modalBody.appendChild(sec);
                }
            }
            openTrainingOverlay();
        });

        document.getElementById('training-modal-close').addEventListener('click', closeTrainingOverlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) closeTrainingOverlay(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrainingOverlay(); });

        body.appendChild(tlink);
    }

    const content = document.createElement('div');
    content.className = 'entry-content';
    const lines = (entry?.content || '').split('\n').map(l => l.trimEnd()).join('<br>\n');
    content.innerHTML = `<p>${lines}</p>`;
    body.appendChild(content);

    const thought = entry?.thought || '';
    if (photos?.length || thought) {
        const gallery = document.createElement('div');
        const totalItems = (thought ? 1 : 0) + (photos?.length || 0);
        const useGrid = totalItems > 3;
        gallery.className = useGrid ? 'entry-photo-grid' : 'entry-gallery';

        const thoughtHtml = thought
            ? `<div class="entry-gallery-item entry-thought-slide"><p>${thought}</p></div>`
            : '';
        const photoHtml = (photos || []).map(p => {
            const src = MEDIA_BASE + p.storage_path;
            const isVideo = /\.(mp4|webm|mov)$/i.test(p.storage_path);
            return `<div class="entry-gallery-item">${isVideo
                ? `<video muted autoplay loop playsinline><source src="${src}" type="video/mp4"></video>`
                : `<img src="${src}" loading="lazy">`}</div>`;
        }).join('');
        const thumbs = thoughtHtml + photoHtml;

        if (useGrid) {
            gallery.innerHTML = thumbs;
        } else {
            gallery.innerHTML = `
                <button class="gallery-arrow gallery-prev" aria-label="previous">&#8592;</button>
                <div class="gallery-track">${thumbs}</div>
                <button class="gallery-arrow gallery-next" aria-label="next">&#8594;</button>
            `;
            const track = gallery.querySelector('.gallery-track');
            const prevBtn = gallery.querySelector('.gallery-prev');
            const nextBtn = gallery.querySelector('.gallery-next');
            const perPage = 3;
            const totalPages = Math.ceil(totalItems / perPage);
            let page = 0;
            function setPage(p) {
                page = Math.max(0, Math.min(p, totalPages - 1));
                track.scrollLeft = page * track.clientWidth;
                prevBtn.classList.toggle('hidden', page === 0);
                nextBtn.classList.toggle('hidden', page >= totalPages - 1);
            }
            prevBtn.addEventListener('click', () => setPage(page - 1));
            nextBtn.addEventListener('click', () => setPage(page + 1));
            setPage(0);
        }

        body.appendChild(gallery);

        if (photos?.length) {
            const lb = document.createElement('div');
            lb.id = 'media-lb';
            document.body.appendChild(lb);
            lb.addEventListener('click', () => {
                lb.classList.remove('open');
                setTimeout(() => { lb.innerHTML = ''; }, 300);
            });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.click(); });

            const mediaItems = Array.from(gallery.querySelectorAll('.entry-gallery-item:not(.entry-thought-slide)'));
            let lbIndex = 0;

            function lbHtml(item) {
                const video = item.querySelector('video');
                if (video) {
                    const src = video.querySelector('source')?.src || video.src;
                    return `<video class="lb-media" autoplay loop playsinline controls><source src="${src}" type="video/mp4"></video>`;
                }
                return `<img class="lb-media" src="${item.querySelector('img').src}">`;
            }

            function openLbAt(i) {
                lbIndex = i;
                lb.innerHTML = lbHtml(mediaItems[i]);
                requestAnimationFrame(() => lb.classList.add('open'));
            }

            mediaItems.forEach((item, i) => {
                const el = item.querySelector('img, video');
                if (!el) return;
                el.style.cursor = 'pointer';
                el.addEventListener('click', () => openLbAt(i));
            });

            document.addEventListener('keydown', e => {
                if (!lb.classList.contains('open')) return;
                if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
                if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + mediaItems.length) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
            });
        }
    }
    const prevDate = prevRows?.[0]?.date;
    const nextDate = nextRows?.[0]?.date;
    if (prevDate || nextDate) {
        const nav = document.createElement('div');
        nav.className = 'entry-nav';
        if (prevDate) {
            const [, pm, pd] = prevDate.split('-');
            nav.innerHTML += `<a href="/entries/view.html?date=${prevDate}" class="entry-nav-link entry-nav-prev">← ${months[parseInt(pm)-1]} ${parseInt(pd)}</a>`;
        } else {
            nav.innerHTML += `<span></span>`;
        }
        if (nextDate) {
            const [, nm, nd] = nextDate.split('-');
            nav.innerHTML += `<a href="/entries/view.html?date=${nextDate}" class="entry-nav-link entry-nav-next">${months[parseInt(nm)-1]} ${parseInt(nd)} →</a>`;
        }
        body.appendChild(nav);
    }
})();
</script>
</html>
