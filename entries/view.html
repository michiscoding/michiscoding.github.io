<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/blog.css">
    <link rel="stylesheet" href="/css/entry.css">
    <style>
        :root { --maxWidth: 67vw; }
        .entry-music { margin-top: 1.5rem; }
    </style>
    <title></title>
</head>
<body>
  <button type="button" class="back-btn" onclick="history.back()">←</button>
  <div class="entry-container" id="entry-body"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>

(async () => {
    const date = new URLSearchParams(location.search).get('date');
    if (!date) return;

    const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    const [yyyy, mm, dd] = date.split('-');
    const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
    document.title = dateTitle;

    const MEDIA_BASE = SUPABASE_URL + '/storage/v1/object/public/media/';
    const [{ data: entry }, { data: photos }] = await Promise.all([
        db.from('entries').select('content, music_url').eq('date', date).single(),
        db.from('entry_photos').select('storage_path').eq('entry_date', date)
    ]);

    const body = document.getElementById('entry-body');
    body.innerHTML = `<h1>${dateTitle}</h1>`;

    const content = document.createElement('div');
    content.className = 'entry-content';
    const lines = (entry?.content || '').split('\n').map(l => l.trimEnd()).join('<br>\n');
    content.innerHTML = `<p>${lines}</p>`;
    body.appendChild(content);

    if (entry?.music_url) {
        const spotifyMatch = entry.music_url.match(/spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
        if (spotifyMatch) {
            const musicEl = document.createElement('div');
            musicEl.className = 'entry-music';
            musicEl.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/${spotifyMatch[1]}/${spotifyMatch[2]}?utm_source=generator" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
            body.appendChild(musicEl);
        }
    }

    if (photos?.length) {
        const gallery = document.createElement('div');
        gallery.className = 'entry-gallery';
        const thumbs = photos.map(p => {
            const src = MEDIA_BASE + p.storage_path;
            const isVideo = /\.(mp4|webm|mov)$/i.test(p.storage_path);
            return `<div class="entry-gallery-item">${isVideo
                ? `<video muted autoplay loop playsinline><source src="${src}" type="video/mp4"></video>`
                : `<img src="${src}" loading="lazy">`}</div>`;
        }).join('');
        gallery.innerHTML = `
            <button class="gallery-arrow gallery-prev" aria-label="previous">&#8592;</button>
            <div class="gallery-track">${thumbs}</div>
            <button class="gallery-arrow gallery-next" aria-label="next">&#8594;</button>
        `;
        body.appendChild(gallery);

        const track = gallery.querySelector('.gallery-track');
        const prevBtn = gallery.querySelector('.gallery-prev');
        const nextBtn = gallery.querySelector('.gallery-next');
        const perPage = 3;
        const totalPages = Math.ceil(photos.length / perPage);
        let page = 0;

        function setPage(p) {
            page = Math.max(0, Math.min(p, totalPages - 1));
            track.scrollLeft = page * track.clientWidth;
            prevBtn.classList.toggle('hidden', page === 0);
            nextBtn.classList.toggle('hidden', page >= totalPages - 1);
        }

        prevBtn.addEventListener('click', () => setPage(page - 1));
        nextBtn.addEventListener('click', () => setPage(page + 1));
        setPage(0);

        const lb = document.createElement('div');
        lb.id = 'media-lb';
        document.body.appendChild(lb);
        lb.addEventListener('click', () => {
            lb.classList.remove('open');
            setTimeout(() => { lb.innerHTML = ''; }, 300);
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.click(); });

        const mediaItems = Array.from(gallery.querySelectorAll('.entry-gallery-item'));
        let lbIndex = 0;

        function lbHtml(item) {
            const video = item.querySelector('video');
            if (video) {
                const src = video.querySelector('source')?.src || video.src;
                return `<video class="lb-media" autoplay loop playsinline controls><source src="${src}" type="video/mp4"></video>`;
            }
            return `<img class="lb-media" src="${item.querySelector('img').src}">`;
        }

        function openLbAt(i) {
            lbIndex = i;
            lb.innerHTML = lbHtml(mediaItems[i]);
            requestAnimationFrame(() => lb.classList.add('open'));
        }

        mediaItems.forEach((item, i) => {
            const el = item.querySelector('img, video');
            if (!el) return;
            el.style.cursor = 'pointer';
            el.addEventListener('click', () => openLbAt(i));
        });

        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
            if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + mediaItems.length) % mediaItems.length; lb.innerHTML = lbHtml(mediaItems[lbIndex]); }
        });
    }
})();
</script>
</html>
