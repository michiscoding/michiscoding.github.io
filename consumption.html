<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <title>consumption</title>
    <style>
        :root { --maxWidth: 67vw; }
        .c-container {
            max-width: var(--maxWidth);
            margin: 3rem auto;
            padding: 0 1.5rem 4rem;
        }
        @media (max-width: 768px) { .c-container { max-width: 92vw; margin: 2rem auto; } }

        .c-tabs { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
        .c-tab {
            background: none; border: none; padding: 0.4rem 0;
            font-family: inherit; font-size: 0.85rem; font-weight: 600;
            color: #aaa; cursor: pointer; outline: none;
            transition: color 0.2s; letter-spacing: 0.05em;
        }
        .c-tab:focus, .c-tab:focus-visible { outline: none; }
        .c-tab.active { color: #222; }
        body.dark .c-tab { color: #555; }
        body.dark .c-tab.active { color: #eee; }

        .c-subtabs { display: flex; gap: 1.5rem; margin: -0.5rem 0 1.25rem; }
        .c-subtab {
            background: none; border: none; padding: 0.2rem 0;
            font-family: inherit; font-size: 0.75rem; font-weight: 600;
            color: #bbb; cursor: pointer; outline: none;
            transition: color 0.2s; letter-spacing: 0.05em;
        }
        .c-subtab:focus, .c-subtab:focus-visible { outline: none; }
        .c-subtab.active { color: #444; }
        body.dark .c-subtab { color: #555; }
        body.dark .c-subtab.active { color: #aaa; }

        /* spotify */
        .sp-section { margin-bottom: 2.5rem; }
        .sp-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; margin-bottom: 0.85rem; }
        .sp-track, .sp-artist { display: flex; align-items: center; gap: 0.85rem; padding: 0.55rem 0; border-bottom: 1px solid #f0f0f0; }
        body.dark .sp-track, body.dark .sp-artist { border-bottom-color: #2a2a2a; }
        .sp-track:last-child, .sp-artist:last-child { border-bottom: none; }
        .sp-rank { font-size: 0.72rem; color: #ccc; width: 1.2rem; flex-shrink: 0; text-align: right; }
        .sp-art { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .sp-art.round { border-radius: 50%; }
        .sp-info { flex: 1; min-width: 0; }
        .sp-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111; }
        body.dark .sp-name { color: #ddd; }
        .sp-sub { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-login-btn { display: inline-block; padding: 0.6rem 1.4rem; background: #1db954; color: #fff; border: none; border-radius: 50px; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 1rem; }
        .sp-login-btn:hover { background: #17a349; }
        .sp-nothing { color: #aaa; font-size: 0.85rem; padding: 2rem 0; text-align: center; }
        .sp-track[data-url], .sp-artist[data-url] { cursor: pointer; }
        .sp-track[data-url]:hover .sp-name, .sp-artist[data-url]:hover .sp-name { color: #1db954; }
        @keyframes vinyl-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .sp-vinyl-wrap { display: flex; flex-direction: column; align-items: center; padding: 3rem 2rem; gap: 1rem; background: #ededed; border-radius: 12px; margin-top: 0.5rem; }
        body.dark .sp-vinyl-wrap { background: #1a1a1a; }
        .sp-vinyl { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; animation: vinyl-spin 8s linear infinite; cursor: pointer; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .sp-vinyl.paused { animation-play-state: paused; }
        body.dark .sp-vinyl { box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .sp-vinyl-info { text-align: center; }
        .sp-vinyl-status { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #1db954; margin-bottom: 0.3rem; }
        .sp-vinyl-status.paused { color: #aaa; }
        .sp-progress-wrap { width: 260px; display: flex; flex-direction: column; gap: 0.3rem; }
        .sp-progress-bar { width: 100%; height: 3px; background: #ddd; border-radius: 2px; overflow: hidden; }
        body.dark .sp-progress-bar { background: #333; }
        .sp-progress-fill { height: 100%; background: #1db954; border-radius: 2px; transition: width 1s linear; }
        .sp-progress-times { display: flex; justify-content: space-between; font-size: 0.68rem; color: #aaa; }

        /* media grid */
        .media-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; }
        .media-grid.movies-grid { grid-template-columns: repeat(6, 1fr); }
        @media (max-width: 1024px) { .media-grid { grid-template-columns: repeat(3, 1fr); } .media-grid.movies-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) { .media-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; } .media-grid.movies-grid { grid-template-columns: repeat(3, 1fr); } }
        .media-card { cursor: pointer; min-width: 0; }
        .media-cover-wrap { aspect-ratio: 2/3; overflow: hidden; border-radius: 6px; background: #e0e0e0; margin-bottom: 0.5rem; }
        body.dark .media-cover-wrap { background: #2a2a2a; }
        .media-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
        .media-card:hover .media-cover-wrap img { transform: scale(1.04); }
        .media-card-title { font-size: 0.8rem; font-weight: 700; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        body.dark .media-card-title { color: #ddd; }
        .media-card-meta { font-size: 0.68rem; font-weight: 400; color: #aaa; }
        .media-card-rating { font-size: 0.68rem; color: #aaa; letter-spacing: 0.05em; }

        /* detail modal */
        #media-detail { position: fixed; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s ease, background 0.25s ease; }
        #media-detail.open { opacity: 1; pointer-events: auto; background: rgba(0,0,0,0.75); }
        .md-box { background: #fff; border-radius: 12px; max-width: 520px; width: 90vw; display: flex; gap: 1.5rem; padding: 1.5rem; position: relative; }
        body.dark .md-box { background: #1e1e1e; }
        .md-cover { width: 110px; flex-shrink: 0; border-radius: 6px; object-fit: cover; aspect-ratio: 2/3; }
        .md-info { flex: 1; min-width: 0; }
        .md-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; color: #111; }
        body.dark .md-title { color: #eee; }
        .md-meta { font-size: 0.75rem; color: #aaa; margin-bottom: 0.75rem; }
        .md-rating { font-size: 0.85rem; color: #aaa; margin-bottom: 0.6rem; letter-spacing: 0.05em; }
        .md-notes { font-size: 0.85rem; color: #555; line-height: 1.6; white-space: pre-wrap; }
        body.dark .md-notes { color: #aaa; }
        .md-close { position: absolute; top: 0.75rem; right: 1rem; background: none; border: none; font-size: 1.3rem; color: #aaa; cursor: pointer; line-height: 1; padding: 0; }
        .md-close:hover { color: #333; }
        body.dark .md-close:hover { color: #eee; }

        /* half-star display */
        .star-full { color: #f5c518; }
        .star-half { display: inline-block; position: relative; color: #ddd; }
        .star-half::after { content: '★'; position: absolute; left: 0; top: 0; width: 50%; overflow: hidden; color: #f5c518; pointer-events: none; }
        .star-empty { color: #ddd; }

        /* food modal layout */
        .md-box.food-detail { flex-direction: column; max-width: 420px; }
        .md-carousel { position: relative; width: 100%; margin-bottom: 0.25rem; }
        .md-car-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; display: block; cursor: pointer; }
        .md-car-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.35); border: none; color: #fff; font-size: 1.1rem; cursor: pointer; padding: 0.6rem 0.5rem; border-radius: 6px; line-height: 1; z-index: 2; }
        .md-car-prev { left: 0.4rem; }
        .md-car-next { right: 0.4rem; }
        .md-car-btn:hover { background: rgba(0,0,0,0.55); }
        .md-car-count { position: absolute; bottom: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.5); color: #fff; font-size: 0.65rem; font-weight: 600; border-radius: 999px; padding: 0.15rem 0.45rem; pointer-events: none; }
        .md-carousel { display: none; }

        /* food */
        .food-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
        @media (max-width: 1024px) { .food-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .food-grid { grid-template-columns: 1fr; gap: 0.75rem; } }
        .food-card { cursor: pointer; min-width: 0; }
        .food-photo-wrap { aspect-ratio: 4/3; overflow: hidden; border-radius: 8px; background: #e8e8e8; margin-bottom: 0.5rem; }
        body.dark .food-photo-wrap { background: #2a2a2a; }
        .food-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
        .food-card:hover .food-photo-wrap img { transform: scale(1.04); }
        .food-no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .food-card-name { font-size: 0.85rem; font-weight: 700; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        body.dark .food-card-name { color: #ddd; }
        .food-card-meta { font-size: 0.68rem; font-weight: 400; color: #aaa; }
        .food-card-rating { font-size: 0.68rem; color: #aaa; }

        /* food detail tags */
        .md-photo-strip { display: none; }
        .md-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
        .md-tag { background: #f0f0f0; border-radius: 999px; padding: 0.2rem 0.6rem; font-size: 0.7rem; font-weight: 600; color: #666; }
        body.dark .md-tag { background: #2a2a2a; color: #999; }
        .food-card-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.25rem; }
        .food-card-tag { background: #f0f0f0; border-radius: 999px; padding: 0.15rem 0.5rem; font-size: 0.63rem; color: #888; }
        body.dark .food-card-tag { background: #222; color: #666; }

        /* food photo lightbox */
        #food-photo-lb { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #food-photo-lb.open { opacity: 1; pointer-events: auto; }
        .food-lb-img { max-width: 88vw; max-height: 82vh; object-fit: contain; border-radius: 8px; display: block; }
        .food-lb-close { position: absolute; top: 1rem; right: 1.25rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; line-height: 1; padding: 0; opacity: 0.7; }
        .food-lb-close:hover { opacity: 1; }
        .food-lb-prev, .food-lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 0.9rem 0.7rem; border-radius: 8px; line-height: 1; }
        .food-lb-prev { left: 1rem; }
        .food-lb-next { right: 1rem; }
        .food-lb-prev:hover, .food-lb-next:hover { background: rgba(255,255,255,0.22); }

        /* food tag filter */
        .food-tag-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .food-tag-pill { background: #f0f0f0; border: none; border-radius: 999px; padding: 0.28rem 0.75rem; font-family: inherit; font-size: 0.72rem; font-weight: 600; color: #888; cursor: pointer; transition: background 0.15s, color 0.15s; }
        .food-tag-pill.active { background: #222; color: #fff; }
        body.dark .food-tag-pill { background: #2a2a2a; color: #555; }
        body.dark .food-tag-pill.active { background: #ddd; color: #111; }

        /* food map */
        .food-view-toggle { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .fv-btn { background: none; border: none; font-family: inherit; font-size: 0.75rem; font-weight: 700; color: #bbb; cursor: pointer; padding: 0 0 0.15rem; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
        .fv-btn.active { color: #222; border-bottom-color: #222; }
        body.dark .fv-btn { color: #555; }
        body.dark .fv-btn.active { color: #ddd; border-bottom-color: #ddd; }
        .food-map-wrap { display: none; height: 460px; border-radius: 12px; overflow: hidden; }
        .food-map-wrap .leaflet-container { height: 100%; border-radius: 12px; }
        /* map link in food detail modal */
        .md-map-link { display: none; font-size: 0.75rem; color: #888; text-decoration: none; margin-top: 0.6rem; }
        .md-map-link:hover { color: #333; }
        body.dark .md-map-link { color: #555; }
        body.dark .md-map-link:hover { color: #ccc; }
        /* map popup */
        .food-popup { min-width: 120px; font-family: 'Montserrat', sans-serif; }
        .food-popup-name { font-weight: 700; font-size: 0.83rem; color: #111; margin-bottom: 0.1rem; }
        .food-popup-loc { font-size: 0.7rem; color: #888; }
        .food-popup-view { display: block; margin-top: 0.45rem; font-size: 0.72rem; font-weight: 700; color: #111; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; text-align: left; }

        @keyframes c-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .c-fade { animation: c-fade-in 0.25s ease forwards; }
        #c-loading { color: #aaa; font-size: 0.85rem; margin-top: 2rem; }
        .c-empty { color: #aaa; font-size: 0.85rem; padding: 3rem 0; text-align: center; }
    </style>
</head>
<body>
<div class="c-container">
    <div class="c-tabs" id="c-tabs">
        <button type="button" class="c-tab active" data-view="spotify">spotify</button>
        <button type="button" class="c-tab" data-view="books">books</button>
        <button type="button" class="c-tab" data-view="movies">movies</button>
        <button type="button" class="c-tab" data-view="food">food</button>
        <button type="button" class="c-tab" data-view="venues">venues</button>
    </div>

</div>

<div id="media-detail">
    <div class="md-box" id="md-box">
        <button type="button" class="md-close" id="md-close">×</button>
        <img class="md-cover" id="md-cover" src="" alt="">
        <div class="md-carousel" id="md-carousel">
            <img class="md-car-img" id="md-car-img" src="" alt="">
            <button type="button" class="md-car-btn md-car-prev" id="md-car-prev">&#8592;</button>
            <button type="button" class="md-car-btn md-car-next" id="md-car-next">&#8594;</button>
            <span class="md-car-count" id="md-car-count"></span>
        </div>
        <div class="md-info">
            <div class="md-title" id="md-title"></div>

<div id="food-photo-lb">
    <button type="button" class="food-lb-close" id="food-lb-close">×</button>
    <button type="button" class="food-lb-prev" id="food-lb-prev">&#8592;</button>
    <img class="food-lb-img" id="food-lb-img" src="" alt="">
    <button type="button" class="food-lb-next" id="food-lb-next">&#8594;</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/home.js"></script>
<script>
const CLIENT_ID = 'd3ab93ff0a8248d79171391eb077f43d';
const REDIRECT_URI = 'https://michiscoding.github.io/consumption.html';
const SCOPES = 'user-top-read user-read-recently-played user-read-currently-playing';

function randomStr(len) {
    const arr = new Uint8Array(len);
    crypto.getRandomValues(arr);
    return btoa(String.fromCharCode(...arr)).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c])).slice(0, len);
}
async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c]));
}
async function login() {
    const verifier = randomStr(64);
    const challenge = await sha256(verifier);
    localStorage.setItem('sp_verifier', verifier);
    location.href = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
        client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
        scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge,
    });
}
async function exchangeCode(code) {
    const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI,
            client_id: CLIENT_ID, code_verifier: localStorage.getItem('sp_verifier'),
        }),
    });
    const data = await res.json();
    if (data.access_token) {
        localStorage.setItem('sp_access_token', data.access_token);
        localStorage.setItem('sp_refresh_token', data.refresh_token);
        localStorage.setItem('sp_token_exp', Date.now() + (data.expires_in - 60) * 1000);
        localStorage.removeItem('sp_verifier');
        history.replaceState({}, '', location.pathname);
    }
    return data.access_token;
}
async function refreshToken() {
    const refresh = localStorage.getItem('sp_refresh_token');
    if (!refresh) return null;
    const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID }),
    });
    const data = await res.json();
    if (data.access_token) {
        localStorage.setItem('sp_access_token', data.access_token);
        localStorage.setItem('sp_token_exp', Date.now() + (data.expires_in - 60) * 1000);
        if (data.refresh_token) localStorage.setItem('sp_refresh_token', data.refresh_token);
    }
    return data.access_token;
}
async function getToken() {
    const exp = parseInt(localStorage.getItem('sp_token_exp') || '0');
    if (Date.now() < exp) return localStorage.getItem('sp_access_token');
    return refreshToken();
}
async function spFetch(path) {
    const token = await getToken();
    const res = await fetch('https://api.spotify.com/v1' + path, { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.status === 204) return null;
    return res.json();
}

function trackRow(t, i) {
    return `<div class="sp-track" data-url="${t.external_urls?.spotify || ''}">
        <span class="sp-rank">${i + 1}</span>
        <img class="sp-art" src="${t.album.images[2]?.url || t.album.images[0]?.url}" alt="">
        <div class="sp-info">
            <div class="sp-name">${t.name}</div>
            <div class="sp-sub">${t.artists.map(a => a.name).join(', ')}</div>
        </div>
    </div>`;
}
function artistRow(a, i) {
    return `<div class="sp-artist" data-url="${a.external_urls?.spotify || ''}">
        <span class="sp-rank">${i + 1}</span>
        <img class="sp-art round" src="${a.images[2]?.url || a.images[0]?.url || ''}" alt="">
        <div class="sp-info">
            <div class="sp-name">${a.name}</div>
            <div class="sp-sub">${(a.genres || []).slice(0, 2).join(', ')}</div>
        </div>
    </div>`;
}

let npTimer = null;

function spSubTabsHtml(active) {
    return [
        { label: '4 weeks', range: 'short_term' },
        { label: '6 months', range: 'medium_term' },
        { label: 'all time', range: 'long_term' },
        { label: 'now playing', range: 'now' },
    ].map(r => `<button type="button" class="c-subtab${r.range === active ? ' active' : ''}" data-range="${r.range}">${r.label}</button>`).join('');
}

function bindSubTabs() {
    document.querySelectorAll('#sp-sub-tabs .c-subtab').forEach(btn => {
        btn.onclick = () => btn.dataset.range === 'now' ? renderNowPlaying() : renderTops(btn.dataset.range);
    });
}

async function renderTops(range) {
    if (npTimer) { clearInterval(npTimer); npTimer = null; }
    document.getElementById('c-content').innerHTML = `
        <div class="c-subtabs" id="sp-sub-tabs">${spSubTabsHtml(range)}</div>
        <div id="sp-tops"><div id="c-loading">loading...</div></div>`;
    bindSubTabs();

    const [tracks, artists] = await Promise.all([
        spFetch(`/me/top/tracks?limit=10&time_range=${range}`),
        spFetch(`/me/top/artists?limit=8&time_range=${range}`),
    ]);

    document.getElementById('sp-tops').innerHTML = `
        <div class="sp-section">
            <div class="sp-label">top tracks</div>
            ${(tracks?.items || []).map((t, i) => trackRow(t, i)).join('')}
        </div>
        <div class="sp-section">
            <div class="sp-label">top artists</div>
            ${(artists?.items || []).map((a, i) => artistRow(a, i)).join('')}
        </div>`;
    fadeIn();

    document.querySelectorAll('.sp-track[data-url], .sp-artist[data-url]').forEach(row => {
        row.addEventListener('click', () => { if (row.dataset.url) window.open(row.dataset.url, '_blank'); });
    });
}

async function renderNowPlaying() {
    if (npTimer) { clearInterval(npTimer); npTimer = null; }
    document.getElementById('c-content').innerHTML = `
        <div class="c-subtabs" id="sp-sub-tabs">${spSubTabsHtml('now')}</div>
        <div id="sp-tops"><div id="c-loading">loading...</div></div>`;
    bindSubTabs();

    const data = await spFetch('/me/player/currently-playing');
    const tops = document.getElementById('sp-tops');
    const t = data?.item;
    if (!t) { tops.innerHTML = '<div class="sp-nothing">nothing playing right now</div>'; fadeIn(); return; }

    const url = t.external_urls?.spotify || '';
    const isPlaying = data.is_playing;
    const duration = t.duration_ms;
    const fmt = ms => { const s = Math.floor(ms / 1000); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; };

    tops.innerHTML = `<div class="sp-vinyl-wrap">
        <img class="sp-vinyl${isPlaying ? '' : ' paused'}" src="${t.album.images[0]?.url || ''}" alt="" title="open in spotify">
        <div class="sp-vinyl-info">
            <div class="sp-vinyl-status${isPlaying ? '' : ' paused'}">${isPlaying ? 'now playing' : 'paused'}</div>
            <div class="sp-name">${t.name}</div>
            <div class="sp-sub">${t.artists.map(a => a.name).join(', ')}</div>
        </div>
        <div class="sp-progress-wrap">
            <div class="sp-progress-bar"><div class="sp-progress-fill" id="sp-fill"></div></div>
            <div class="sp-progress-times"><span id="sp-elapsed"></span><span>${fmt(duration)}</span></div>
        </div>
    </div>`;
    if (url) tops.querySelector('.sp-vinyl').addEventListener('click', () => window.open(url, '_blank'));
    fadeIn();

    let progress = data.progress_ms;
    function updateProgress() {
        const fill = document.getElementById('sp-fill');
        const elapsed = document.getElementById('sp-elapsed');
        if (!fill || !elapsed) { clearInterval(npTimer); return; }
        fill.style.width = `${Math.min(100, (progress / duration) * 100)}%`;
        elapsed.textContent = fmt(progress);
        if (isPlaying) progress += 1000;
    }
    updateProgress();
    if (isPlaying) npTimer = setInterval(updateProgress, 1000);
}

// media
function starsHtml(rating) {
    if (!rating) return '';
    let html = '';
    for (let i = 1; i <= 5; i++) {
        if (rating >= i) html += '<span class="star-full">★</span>';
        else if (rating >= i - 0.5) html += '<span class="star-half">★</span>';
        else html += '<span class="star-empty">☆</span>';
    }
    return html;
}

async function renderMedia(view) {

async function showFoodMap(data) {
    if (foodLeafletMap) { foodLeafletMap.invalidateSize(); return; }

    const mapEl = document.getElementById('food-map-inner');
    foodLeafletMap = L.map(mapEl).setView([40.758, -73.985], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 19
    }).addTo(foodLeafletMap);

    // geocode items not yet cached
    for (const item of data.filter(d => d.location && !(d.location in geocodeCache))) {
        try {
            const q = encodeURIComponent(`${item.name} ${item.location}`);
            const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, {
                headers: { 'User-Agent': 'michiscoding.github.io' }
            });
            const results = await res.json();
            geocodeCache[item.location] = results[0]
                ? [parseFloat(results[0].lat), parseFloat(results[0].lon)]
                : null;
        } catch { geocodeCache[item.location] = null; }
        await new Promise(r => setTimeout(r, 220));
    }

    const bounds = [];
    data.forEach(item => {
        const coords = geocodeCache[item.location];
        if (!coords) return;

        const popupEl = document.createElement('div');
        popupEl.className = 'food-popup';
        popupEl.innerHTML = `
            <div class="food-popup-name">${item.name}</div>
            ${item.location ? `<div class="food-popup-loc">${item.location}</div>` : ''}
            ${item.rating ? `<div style="margin-top:0.25rem;font-size:0.78rem">${starsHtml(item.rating)}</div>` : ''}`;
        const viewBtn = document.createElement('button');
        viewBtn.className = 'food-popup-view';
        viewBtn.textContent = 'view →';
        viewBtn.addEventListener('click', () => openFoodDetail(item));
        popupEl.appendChild(viewBtn);

        L.marker(coords).addTo(foodLeafletMap).bindPopup(popupEl);
        bounds.push(coords);
    });

    if (bounds.length > 1) foodLeafletMap.fitBounds(bounds, { padding: [50, 50] });
    else if (bounds.length === 1) foodLeafletMap.setView(bounds[0], 15);
}

async function openFoodDetail(item) {
    const cover = document.getElementById('md-cover');

    const box = document.getElementById('md-box');
    box.classList.add('food-detail');

    document.getElementById('md-rating').innerHTML = starsHtml(item.rating || 0);
    document.getElementById('md-notes').textContent = item.notes || '';
    const mapLink = document.getElementById('md-map-link');
    const mapsUrl = item.place_id
        ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name)}&query_place_id=${item.place_id}`
        : `https://maps.google.com/?q=${encodeURIComponent([item.name, item.location].filter(Boolean).join(' '))}`;
    mapLink.href = mapsUrl;
    mapLink.style.display = 'block';
    document.getElementById('media-detail').classList.add('open');

    const { data: photos } = await db.from('food_photos').select('storage_path').eq('food_id', item.id);
    if (photos?.length) {
        const base = SUPABASE_URL + '/storage/v1/object/public/media/';
        const urls = photos.map(p => base + p.storage_path);
        let carIdx = 0;
        const prevBtn = document.getElementById('md-car-prev');
        const nextBtn = document.getElementById('md-car-next');
        const countEl = document.getElementById('md-car-count');
        const updateCarousel = (idx) => {
            carIdx = idx;
            carImg.src = urls[carIdx];
            prevBtn.style.display = urls.length > 1 ? '' : 'none';
            nextBtn.style.display = urls.length > 1 ? '' : 'none';
            countEl.style.display = urls.length > 1 ? '' : 'none';
            if (urls.length > 1) countEl.textContent = `${carIdx + 1} / ${urls.length}`;
        };
        prevBtn.onclick = (e) => { e.stopPropagation(); updateCarousel((carIdx - 1 + urls.length) % urls.length); };
        nextBtn.onclick = (e) => { e.stopPropagation(); updateCarousel((carIdx + 1) % urls.length); };
        carImg.onclick = () => openFoodLb(urls, carIdx);
        carousel.style.display = 'block';
        updateCarousel(0);
    }
}

    const dateList = item.dates?.length ? item.dates : (item.date ? [item.date] : []);
    const dateStr = dateList.map(d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long' })).join(', ');

    document.getElementById('md-title').textContent = item.name;
    document.getElementById('md-meta').textContent = [item.location, dateStr].filter(Boolean).join(' · ');
    document.getElementById('md-tags').innerHTML = (item.tags || []).map(t => `<span class="md-tag">${t}</span>`).join('');
    document.getElementById('md-photo-strip').innerHTML = '';
    cover.style.display = item.photo_url ? '' : 'none';
    cover.src = item.photo_url || '';
    document.getElementById('md-rating').innerHTML = starsHtml(item.rating || 0);
    document.getElementById('md-notes').textContent = item.notes || '';
    const mapLink = document.getElementById('md-map-link');
    const mapsUrl = item.place_id
        ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name)}&query_place_id=${item.place_id}`
        : `https://maps.google.com/?q=${encodeURIComponent([item.name, item.location].filter(Boolean).join(' '))}`;
    mapLink.href = mapsUrl;
    mapLink.style.display = 'block';
    document.getElementById('media-detail').classList.add('open');

    const { data: photos } = await db.from('venue_photos').select('storage_path').eq('venue_id', item.id);
    cover.onclick = null;
    cover.style.cursor = '';
    if (photos?.length) {
        const base = SUPABASE_URL + '/storage/v1/object/public/media/';
        const urls = photos.map(p => base + p.storage_path);
        cover.style.cursor = 'pointer';
        cover.title = `${urls.length} photo${urls.length > 1 ? 's' : ''} — click to view`;
        cover.onclick = () => openFoodLb(urls, 0);
    }
}

// food photo lightbox
let foodLbPhotos = [], foodLbIdx = 0;
function openFoodLb(photos, idx) {
    foodLbPhotos = photos; foodLbIdx = idx;
    document.getElementById('food-lb-img').src = photos[idx];
    const lb = document.getElementById('food-photo-lb');
    lb.classList.add('open');
    document.getElementById('food-lb-prev').style.display = photos.length > 1 ? '' : 'none';
    document.getElementById('food-lb-next').style.display = photos.length > 1 ? '' : 'none';
}
function closeFoodLb() { document.getElementById('food-photo-lb').classList.remove('open'); }
document.getElementById('food-lb-close').onclick = closeFoodLb;
document.getElementById('food-photo-lb').addEventListener('click', e => { if (e.target === e.currentTarget) closeFoodLb(); });
document.getElementById('food-lb-prev').onclick = () => { foodLbIdx = (foodLbIdx - 1 + foodLbPhotos.length) % foodLbPhotos.length; document.getElementById('food-lb-img').src = foodLbPhotos[foodLbIdx]; };
document.getElementById('food-lb-next').onclick = () => { foodLbIdx = (foodLbIdx + 1) % foodLbPhotos.length; document.getElementById('food-lb-img').src = foodLbPhotos[foodLbIdx]; };
document.addEventListener('keydown', e => {
    if (!document.getElementById('food-photo-lb').classList.contains('open')) return;
    if (e.key === 'Escape') closeFoodLb();
    if (e.key === 'ArrowLeft') document.getElementById('food-lb-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('food-lb-next').click();
});
</script>
